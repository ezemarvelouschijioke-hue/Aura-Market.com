<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
   <form id="register-form" class="card p-4 w-25 mx-auto mt-5">
    <h4>Register</h4>
    <input type="text" id="reg-name" class="form-control mb-2" placeholder="USERNAME" required>
    <input type="email" id="reg-email" class="form-control mb-2" placeholder="Email" required>
    <input type="password" id="reg-pass" class="form-control mb-2" placeholder="Password" required>
    <button type="submit" class="btn btn-success">Create Account</button>
    <p class="mt-3 text-center">Already have an account? <a href="login.html">Login here</a></p>
</form>

<script>
document.getElementById('register-form').addEventListener('submit', function(e) {
    e.preventDefault(); // Stop page from refreshing

    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-pass').value;

    // 1. Get existing users or start a new list
    let users = JSON.parse(localStorage.getItem("AURA_USERS")) || [];

    // 2. Check if email already exists
    if(users.some(u => u.email === email)) {
        return alert("This email is already registered!");
    }

    // 3. Add new user to the list
    users.push({ name: name, email: email, password: password });

    // 4. Save back to LocalStorage
    localStorage.setItem("AURA_USERS", JSON.stringify(users));

    alert("Account Created! Please login.");
    window.location.href = "login.html"; // Send them to login page
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
