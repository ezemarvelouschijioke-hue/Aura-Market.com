<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Market</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="container-fluid">
        <h1>Aura Market</h1>

        <div class="search-container">
            <input type="text" id="search-bar" placeholder="Search products...">
        </div>
        
        <div class="d-flex align-items-center">
            <a href="login.html" class="btn btn-outline-light me-2" id="login-btn">
                <i class="fa fa-user"></i> Login
            </a>

            <div class="form-check form-switch ms-3 d-flex align-items-center">
                <input class="form-check-input" type="checkbox" id="themeToggle">
                <label class="form-check-label text-white ms-2 theme-icon" for="themeToggle">
                    <i class="fa fa-sun"></i>
                </label>
            </div>
            
            <button id="open-cart-btn" class="btn btn-warning ms-3">
                <span id="cart-count">0</span> <i class="fa fa-cart-shopping"></i> cart
            </button>
        </div>
    </div>
</nav>

<header class="hero">
    <h1>Elevate Your Lifestyle</h1> <br>
    <p>With Our</p>
    <p>Curated premium goods delivered to your door.</p>
</header>

<div class="category-filters text-center my-4">
    <button class="btn btn-outline-light active" onclick="filterByCategory('all')">All Products</button>
    <button class="btn btn-outline-light" onclick="filterByCategory('Electronics')">Electronics</button>
    <button class="btn btn-outline-light" onclick="filterByCategory('Fashion')">Fashion</button>
    <button class="btn btn-outline-light" onclick="filterByCategory('Accessories')">Accessories</button>
    <button class="btn btn-outline-light" onclick="filterByCategory('Beauty')">Beauty</button>
</div>

<main class="container">
    <div class="product-grid"></div>
</main>

<!-- FLASH SALE BANNER -->
<section class="flash-sale-banner" style="background: linear-gradient(135deg, #ff4757, #ff6b81); padding: 30px; margin: 20px 0;">
    <div class="container text-center">
        <h2 class="mb-3">⚡ FLASH SALE ⚡</h2>
        <div id="sale-timer" style="font-size: 36px; font-weight: bold; margin-bottom: 20px;">23:59:59</div>
        <p>Limited time offers - Grab them before they're gone!</p>
    </div>
</section>

<!-- DEAL OF THE DAY -->
<section class="section">
    <div class="section-header">
        <h2>🔥 Deal of the Day</h2>
        <a href="javascript:void(0)" class="view-all" onclick="filterByCategory('all')">View All Deals <i class="fas fa-arrow-right"></i></a>
    </div>
    <div class="row" id="deal-of-day-grid">
        <!-- Deal products will load here -->
    </div>
</section>

<!-- CART SIDEBAR -->
<aside id="sidebar-cart" class="cart-sidebar">
    <div class="cart-header">
        <h2>Your Cart</h2>
        <button id="close-cart-btn" class="btn btn-sm btn-danger">
            <i class="fa fa-times"></i>
        </button>
    </div>

    <div class="cart-items">
        <!-- Cart items will be rendered here -->
    </div>

    <div class="cart-footer">
        <div class="d-flex justify-content-between mb-3">
            <strong>Total:</strong>
            <strong>$<span class="total-price">0.00</span></strong>
        </div>
        
        <input type="email" id="email-address" class="form-control mb-2" 
               placeholder="Enter your email for receipt">
        
        <button class="checkout-btn" onclick="checkout()">
            <i class="fa fa-credit-card"></i> Pay with Paystack
        </button>
    </div>
</aside>

<div id="overlay"></div>

<div class="modal fade" id="reviewModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">Leave a Review</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="review-product-id">
                <div class="mb-3">
                    <label>Rating (1-5)</label>
                    <select id="review-rating" class="form-select bg-secondary text-white border-0">
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Very Good</option>
                        <option value="3">3 - Good</option>
                        <option value="2">2 - Fair</option>
                        <option value="1">1 - Poor</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Your Comment</label>
                    <textarea id="review-comment" class="form-control bg-secondary text-white border-0" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-primary" onclick="saveReview()">Submit Review</button>
            </div>
        </div>
    </div>
</div>

<!-- JS FILES -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>

<!-- Core files FIRST -->
<script src="js/core/config.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>

<!-- Modules SECOND -->
<script src="js/modules/products.js"></script>
<script src="js/modules/auth.js"></script>
<script src="js/modules/wishlist.js"></script>
<script src="js/modules/cart.js"></script>
<script src="js/modules/payment.js"></script>

<!-- Theme manager -->
<script src="js/theme.js"></script>

<!-- Page-specific LAST -->
<script src="js/pages/home.js"></script>

</body>
</html>
