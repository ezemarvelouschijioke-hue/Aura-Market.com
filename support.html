<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Center - Aura Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .support-container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }
        .ticket-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .ticket-card:hover {
            transform: translateY(-2px);
            border-color: #09a5db;
        }
        .ticket-status {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-open { background: #ffc107; color: black; }
        .status-pending { background: #17a2b8; color: white; }
        .status-closed { background: #28a745; color: white; }
        .status-urgent { background: #dc3545; color: white; }
        .new-ticket-form {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .ticket-reply {
            background: #0f0f0f;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 3px solid #09a5db;
        }
        .faq-link {
            color: #09a5db;
            text-decoration: none;
        }
        .faq-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container-fluid">
        <a href="index.html" style="text-decoration: none; color: white;"><h1>Aura Market</h1></a>
        <div class="d-flex align-items-center">
            <a href="index.html" class="btn btn-outline-light me-2">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="faq.html" class="btn btn-outline-light me-2">
                <i class="fas fa-question-circle"></i> FAQ
            </a>
            <button id="open-cart-btn" class="btn btn-warning ms-3">
                <span id="cart-count">0</span> <i class="fa fa-cart-shopping"></i> cart
            </button>
        </div>
    </div>
</nav>

<div class="support-container">
    <h1 class="mb-4">🎫 Support Center</h1>
    
    <!-- Quick Actions -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="ticket-card text-center" onclick="window.location.href='faq.html'">
                <i class="fas fa-question-circle fa-3x text-info mb-3"></i>
                <h5>FAQ & Knowledge Base</h5>
                <p class="text-muted">Find answers to common questions</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="ticket-card text-center" onclick="window.location.href='order-tracking.html'">
                <i class="fas fa-truck fa-3x text-success mb-3"></i>
                <h5>Track Order</h5>
                <p class="text-muted">Check your order status</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="ticket-card text-center" onclick="window.location.href='returns.html'">
                <i class="fas fa-undo-alt fa-3x text-warning mb-3"></i>
                <h5>Returns & Refunds</h5>
                <p class="text-muted">Start a return request</p>
            </div>
        </div>
    </div>
    
    <!-- My Tickets Section -->
    <h3 class="mb-3">📋 My Support Tickets</h3>
    <div id="tickets-list"></div>
    
    <!-- New Ticket Form -->
    <div class="new-ticket-form">
        <h4 class="mb-3">Create New Ticket</h4>
        <form id="ticket-form">
            <div class="mb-3">
                <label class="form-label">Subject *</label>
                <input type="text" id="ticket-subject" class="form-control bg-dark text-white" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select id="ticket-category" class="form-select bg-dark text-white">
                    <option value="order">Order Issue</option>
                    <option value="payment">Payment Problem</option>
                    <option value="shipping">Shipping & Delivery</option>
                    <option value="return">Return Request</option>
                    <option value="product">Product Question</option>
                    <option value="account">Account Issue</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Message *</label>
                <textarea id="ticket-message" rows="5" class="form-control bg-dark text-white" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Priority</label>
                <select id="ticket-priority" class="form-select bg-dark text-white">
                    <option value="normal">Normal</option>
                    <option value="urgent">Urgent</option>
                    <option value="emergency">Emergency</option>
                </select>
            </div>
            <div class="mb-3">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="ticket-attach">
                    <label class="form-check-label">Attach order number (optional)</label>
                    <input type="text" id="ticket-order" class="form-control bg-dark text-white mt-2" placeholder="e.g., AURA-12345">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-paper-plane"></i> Submit Ticket
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/core/config.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/modules/auth.js"></script>
<script src="js/modules/cart.js"></script>
<script src="js/theme.js"></script>
<script>
    let currentUser = null;
    
    document.addEventListener('DOMContentLoaded', () => {
        const user = AuthService.getCurrentUser();
        if (!user) {
            window.location.href = 'login.html?redirect=support.html';
            return;
        }
        currentUser = user;
        loadTickets();
    });
    
    function loadTickets() {
        const tickets = JSON.parse(localStorage.getItem('support_tickets')) || [];
        const userTickets = tickets.filter(t => t.userEmail === currentUser.email);
        const container = document.getElementById('tickets-list');
        
        if (userTickets.length === 0) {
            container.innerHTML = `
                <div class="text-center p-5 bg-dark rounded">
                    <i class="fas fa-ticket-alt fa-4x text-muted mb-3"></i>
                    <h5>No support tickets yet</h5>
                    <p class="text-muted">Create a ticket below and we'll get back to you within 24 hours.</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = userTickets.map(ticket => `
            <div class="ticket-card">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h5 class="mb-1">#${ticket.id}</h5>
                        <h6>${ticket.subject}</h6>
                        <span class="badge bg-secondary">${ticket.category}</span>
                    </div>
                    <div class="text-end">
                        <span class="ticket-status status-${ticket.status}">${ticket.status}</span>
                        <div class="text-muted small mt-1">${new Date(ticket.createdAt).toLocaleString()}</div>
                    </div>
                </div>
                <div class="mt-3">
                    <p class="text-muted">${ticket.message}</p>
                </div>
                <div class="ticket-reply">
                    <div class="d-flex justify-content-between">
                        <strong><i class="fas fa-reply"></i> Latest Reply</strong>
                        <small class="text-muted">${ticket.messages[ticket.messages.length-1]?.timestamp ? new Date(ticket.messages[ticket.messages.length-1].timestamp).toLocaleString() : ''}</small>
                    </div>
                    <p class="mt-2 mb-0">${ticket.messages[ticket.messages.length-1]?.message || 'Awaiting response...'}</p>
                </div>
                <button class="btn btn-outline-light btn-sm mt-3" onclick="viewTicket('${ticket.id}')">
                    <i class="fas fa-eye"></i> View Details
                </button>
            </div>
        `).join('');
    }
    
    function viewTicket(ticketId) {
        window.location.href = `ticket-details.html?id=${ticketId}`;
    }
    
    document.getElementById('ticket-form').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const subject = document.getElementById('ticket-subject').value;
        const message = document.getElementById('ticket-message').value;
        const category = document.getElementById('ticket-category').value;
        const priority = document.getElementById('ticket-priority').value;
        
        if (!subject || !message) {
            Utils.showToast('Please fill all required fields', 'error');
            return;
        }
        
        const ticket = {
            id: 'TKT-' + Date.now(),
            userId: currentUser.id,
            userEmail: currentUser.email,
            userName: currentUser.name,
            subject,
            message,
            category,
            priority,
            status: 'open',
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            messages: [{ from: currentUser.email, message, timestamp: new Date().toISOString() }]
        };
        
        let tickets = JSON.parse(localStorage.getItem('support_tickets')) || [];
        tickets.unshift(ticket);
        localStorage.setItem('support_tickets', JSON.stringify(tickets));
        
        Utils.showToast('Ticket created! We\'ll respond within 24 hours.', 'success');
        document.getElementById('ticket-form').reset();
        loadTickets();
    });
</script>
</body>
</html>
