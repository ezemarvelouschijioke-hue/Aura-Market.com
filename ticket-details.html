<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Details - Aura Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .ticket-detail-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .ticket-header {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .message-thread {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
        }
        .message.admin {
            background: #0f0f0f;
            border-left: 3px solid #09a5db;
        }
        .message.user {
            background: #0f0f0f;
            border-left: 3px solid #ffc107;
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
            color: #b0b0b0;
        }
        .reply-form {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container-fluid">
        <a href="index.html" style="text-decoration: none; color: white;"><h1>Aura Market</h1></a>
        <div class="d-flex align-items-center">
            <a href="support.html" class="btn btn-outline-light me-2">
                <i class="fas fa-arrow-left"></i> Back to Support
            </a>
        </div>
    </div>
</nav>

<div id="ticket-content" class="ticket-detail-container">
    <!-- Loaded by JS -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/core/config.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/modules/auth.js"></script>
<script src="js/theme.js"></script>
<script>
    let currentTicket = null;
    
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const ticketId = urlParams.get('id');
        
        if (!ticketId) {
            window.location.href = 'support.html';
            return;
        }
        
        loadTicket(ticketId);
    });
    
    function loadTicket(ticketId) {
        const tickets = JSON.parse(localStorage.getItem('support_tickets')) || [];
        currentTicket = tickets.find(t => t.id === ticketId);
        
        if (!currentTicket) {
            window.location.href = 'support.html';
            return;
        }
        
        const container = document.getElementById('ticket-content');
        
        container.innerHTML = `
            <div class="ticket-header">
                <div class="d-flex justify-content-between">
                    <div>
                        <h3>#${currentTicket.id}</h3>
                        <h5>${currentTicket.subject}</h5>
                    </div>
                    <div>
                        <span class="status-badge bg-${currentTicket.status === 'open' ? 'warning' : currentTicket.status === 'closed' ? 'success' : 'info'}">
                            ${currentTicket.status.toUpperCase()}
                        </span>
                    </div>
                </div>
                <div class="mt-3">
                    <span class="badge bg-secondary">${currentTicket.category}</span>
                    <span class="badge bg-${currentTicket.priority === 'urgent' ? 'danger' : 'secondary'}">${currentTicket.priority}</span>
                    <span class="text-muted ms-2">Created: ${new Date(currentTicket.createdAt).toLocaleString()}</span>
                </div>
            </div>
            
            <div class="message-thread" id="message-thread">
                ${currentTicket.messages.map(msg => `
                    <div class="message ${msg.from === 'support@auramarket.com' ? 'admin' : 'user'}">
                        <div class="message-header">
                            <span><strong>${msg.from === 'support@auramarket.com' ? 'Support Team' : currentTicket.userName}</strong></span>
                            <span>${new Date(msg.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="message-text">${msg.message}</div>
                    </div>
                `).join('')}
            </div>
            
            ${currentTicket.status !== 'closed' ? `
                <div class="reply-form">
                    <h5>Reply to Ticket</h5>
                    <textarea id="reply-message" class="form-control bg-dark text-white" rows="4" placeholder="Type your reply..."></textarea>
                    <button class="btn btn-primary mt-3" onclick="sendReply()">
                        <i class="fas fa-paper-plane"></i> Send Reply
                    </button>
                    <button class="btn btn-outline-danger mt-3 ms-2" onclick="closeTicket()">
                        <i class="fas fa-times"></i> Close Ticket
                    </button>
                </div>
            ` : `
                <div class="alert alert-info">
                    <i class="fas fa-check-circle"></i> This ticket is closed. For further assistance, please create a new ticket.
                </div>
            `}
        `;
        
        // Scroll to bottom
        document.getElementById('message-thread').scrollTop = document.getElementById('message-thread').scrollHeight;
    }
    
    function sendReply() {
        const message = document.getElementById('reply-message').value;
        if (!message) {
            Utils.showToast('Please enter a message', 'error');
            return;
        }
        
        currentTicket.messages.push({
            from: currentTicket.userEmail,
            message,
            timestamp: new Date().toISOString()
        });
        currentTicket.updatedAt = new Date().toISOString();
        currentTicket.status = 'pending';
        
        let tickets = JSON.parse(localStorage.getItem('support_tickets')) || [];
        const index = tickets.findIndex(t => t.id === currentTicket.id);
        if (index !== -1) {
            tickets[index] = currentTicket;
            localStorage.setItem('support_tickets', JSON.stringify(tickets));
        }
        
        Utils.showToast('Reply sent!', 'success');
        loadTicket(currentTicket.id);
    }
    
    function closeTicket() {
        if (confirm('Are you sure you want to close this ticket?')) {
            currentTicket.status = 'closed';
            
            let tickets = JSON.parse(localStorage.getItem('support_tickets')) || [];
            const index = tickets.findIndex(t => t.id === currentTicket.id);
            if (index !== -1) {
                tickets[index] = currentTicket;
                localStorage.setItem('support_tickets', JSON.stringify(tickets));
            }
            
            Utils.showToast('Ticket closed', 'info');
            setTimeout(() => {
                window.location.href = 'support.html';
            }, 1500);
        }
    }
</script>
</body>
</html>
