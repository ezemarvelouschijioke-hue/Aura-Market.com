<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Aura Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <meta name="description" content="Shop the best products at Aura Market - Your premium e-commerce destination">
<meta name="keywords" content="ecommerce, shop, buy, products, aura market">
<meta name="author" content="Aura Market">
    <style>
        body {
            background: #0f0f0f;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .offline-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            border: 1px solid #333;
        }
        .offline-icon {
            font-size: 80px;
            color: #ffc107;
            margin-bottom: 20px;
        }
        h1 {
            color: #09a5db;
            margin-bottom: 20px;
        }
        p {
            color: #b0b0b0;
            margin-bottom: 30px;
        }
        .btn-retry {
            background: #09a5db;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin-right: 10px;
        }
        .btn-retry:hover {
            background: #0789b7;
        }
        .btn-home {
            background: transparent;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            border: 1px solid #333;
            display: inline-block;
        }
        .btn-home:hover {
            border-color: #09a5db;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h1>You're Offline</h1>
        <p>Please check your internet connection and try again.</p>
        <div>
            <button class="btn-retry" onclick="window.location.reload()">
                <i class="fas fa-sync-alt"></i> Retry
            </button>
            <a href="index.html" class="btn-home">
                <i class="fas fa-home"></i> Home
            </a>
        </div>
    </div>
    <!-- Theme Manager -->
<script src="js/theme.js"></script>
</body>
</html>
