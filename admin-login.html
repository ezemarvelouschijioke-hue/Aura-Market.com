<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Aura Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .admin-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-login-card text-center">
        <div class="admin-icon">👑</div>
        <h2 class="mb-4">Admin Portal</h2>
        <form id="admin-login-form">
            <div class="mb-3 text-start">
                <label>Admin Email</label>
                <input type="email" id="admin-email" class="form-control bg-transparent text-white" required>
            </div>
            <div class="mb-3 text-start">
                <label>Password</label>
                <input type="password" id="admin-pass" class="form-control bg-transparent text-white" required>
            </div>
            <button type="submit" class="btn btn-warning w-100 mt-3">Access Dashboard</button>
        </form>
        <a href="index.html" class="d-block mt-3 text-white-50">← Back to Store</a>
    </div>

    <script src="js/core/config.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/modules/auth.js"></script>
    <script>
        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-pass').value;
            
            if (AuthService.adminLogin(email, password)) {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>
