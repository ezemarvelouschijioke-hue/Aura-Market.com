<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Market - Sign Up</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            /* Using a dark gradient as a fallback if the image isn't there */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('../assets/images/signup-bg.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* Safari support */
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 450px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .form-control {
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white !important;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #09a5db;
            box-shadow: none;
        }

        .btn-warning {
            background-color: #ffc107;
            font-weight: 600;
            border: none;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <h1 class="mb-2">Join Aura</h1>
    <p class="text-white-50 mb-4">Create an account to start shopping</p>

    <form id="signup-form">
        <div class="mb-3 text-start">
            <label class="form-label small">Full Name</label>
            <input type="text" id="signup-name" class="form-control bg-transparent" placeholder="John Doe" required>
        </div>

        <div class="mb-3 text-start">
            <label class="form-label small">Email Address</label>
            <input type="email" id="signup-email" class="form-control bg-transparent" placeholder="name@example.com" required>
        </div>

        <div class="mb-4 text-start">
            <label class="form-label small">Create Password</label>
            <input type="password" id="signup-pass" class="form-control bg-transparent" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-warning w-100 py-2">Create Account</button>
    </form>

    <div class="mt-4 pt-2 border-top border-secondary">
        <p class="small mb-0">Already have an account? <a href="login.html" class="text-info text-decoration-none font-weight-bold">Login here</a></p>
    </div>
</div>

<script src="js/signup.js"></script>

<script src="js/core/config.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/modules/products.js"></script>
<script src="js/modules/auth.js"></script>
<script src="js/modules/wishlist.js"></script>
<script src="js/modules/cart.js"></script>
<script src="js/theme.js"></script>  
<script src="js/pages/home.js"></script>
<script>
document.getElementById('signup-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const name = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-pass').value;
    
    if (AuthService.signup(name, email, password)) {
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 1500);
    }
});
</script>

</body>
</html>
