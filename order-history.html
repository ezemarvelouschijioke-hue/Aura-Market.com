<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Aura Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <meta name="description" content="Shop the best products at Aura Market - Your premium e-commerce destination">
<meta name="keywords" content="ecommerce, shop, buy, products, aura market">
<meta name="author" content="Aura Market">
    <style>
        .order-history-container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }
        .order-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-color: #09a5db;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
            margin-bottom: 15px;
        }
        .order-id {
            font-weight: bold;
            color: #09a5db;
        }
        .order-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-delivered { background: #28a745; color: white; }
        .status-shipped { background: #17a2b8; color: white; }
        .status-processing { background: #ffc107; color: black; }
        .status-cancelled { background: #dc3545; color: white; }
        .order-items {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
        }
        .order-item {
            min-width: 100px;
            text-align: center;
        }
        .order-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 5px;
        }
        .order-total {
            font-size: 18px;
            font-weight: bold;
            color: #ffc107;
        }
        .empty-history {
            text-align: center;
            padding: 80px 20px;
            background: #1a1a1a;
            border-radius: 10px;
        }
        .empty-history i {
            font-size: 80px;
            color: #333;
            margin-bottom: 20px;
        }
        .track-btn {
            background: #09a5db;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .track-btn:hover {
            background: #0789b7;
            transform: translateY(-2px);
        }
        .details-btn {
            background: transparent;
            color: white;
            border: 1px solid #333;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .details-btn:hover {
            border-color: #09a5db;
            color: #09a5db;
        }
    </style>
</head>
<body>
   <nav class="navbar">
    <div class="container-fluid">
        <h1>Aura Market</h1>

        <div class="search-container">
            <input type="text" id="search-bar" placeholder="Search products...">
        </div>
        
        <div class="d-flex align-items-center">
            <!-- 🔥 NEW: Order History Link -->
            <a href="order-history.html" class="btn btn-outline-light me-2">
                <i class="fa fa-history"></i> Orders
            </a>
            
            <a href="login.html" class="btn btn-outline-light me-2" id="login-btn">
                <i class="fa fa-user"></i> Login
            </a>

            <div class="form-check form-switch ms-3 d-flex align-items-center">
                <input class="form-check-input" type="checkbox" id="themeToggle">
                <label class="form-check-label text-white ms-2 theme-icon" for="themeToggle">
                    <i class="fa fa-sun"></i>
                </label>
            </div>
            
            <button id="open-cart-btn" class="btn btn-warning ms-3">
                <span id="cart-count">0</span> <i class="fa fa-cart-shopping"></i> cart
            </button>
        </div>
    </div>
</nav>

    <div class="order-history-container">
        <h2 class="mb-4">📦 My Order History</h2>
        
        <div id="order-history-list">
            <!-- Orders will be loaded here -->
        </div>
        
        <div id="empty-history" class="empty-history" style="display: none;">
            <i class="fas fa-shopping-bag"></i>
            <h3>No orders yet</h3>
            <p>Looks like you haven't placed any orders.</p>
            <a href="index.html" class="btn btn-primary">Start Shopping</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadOrderHistory();
        });

        function loadOrderHistory() {
            // Get orders from localStorage
            const orders = JSON.parse(localStorage.getItem('AURA_ORDERS')) || [];
            const container = document.getElementById('order-history-list');
            const emptyMsg = document.getElementById('empty-history');
            
            if (orders.length === 0) {
                container.innerHTML = '';
                emptyMsg.style.display = 'block';
                return;
            }
            
            emptyMsg.style.display = 'none';
            
            container.innerHTML = orders.map(order => {
                const statusClass = {
                    'delivered': 'status-delivered',
                    'shipped': 'status-shipped',
                    'processing': 'status-processing',
                    'cancelled': 'status-cancelled'
                }[order.status] || 'status-processing';
                
                const date = new Date(order.date).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                
                return `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="order-id">#${order.id}</span>
                                <span class="ms-3 text-muted">Placed on ${date}</span>
                            </div>
                            <div>
                                <span class="order-status ${statusClass}">${order.status || 'Processing'}</span>
                            </div>
                        </div>
                        
                        <div class="order-items">
                            ${order.items ? order.items.map(item => `
                                <div class="order-item">
                                    <img src="${item.img || 'https://via.placeholder.com/80'}" alt="${item.name}">
                                    <div>${item.name}</div>
                                    <div class="text-warning">$${item.price}</div>
                                    <div class="text-muted">Qty: ${item.quantity || 1}</div>
                                </div>
                            `).join('') : '<p>No items</p>'}
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top border-secondary">
                            <div>
                                <span class="text-muted">Total:</span>
                                <span class="order-total ms-2">$${order.amount ? order.amount.toFixed(2) : '0.00'}</span>
                            </div>
                            <div>
                                <button class="track-btn me-2" onclick="trackOrder('${order.id}')">
                                    <i class="fas fa-truck"></i> Track
                                </button>
                                <button class="details-btn" onclick="viewOrderDetails('${order.id}')">
                                    <i class="fas fa-eye"></i> Details
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function trackOrder(orderId) {
            localStorage.setItem('tracking_order', orderId);
            window.location.href = `order-tracking.html?id=${orderId}`;
        }
        
        function viewOrderDetails(orderId) {
            // Store order ID for details page
            localStorage.setItem('view_order', orderId);
            alert(`Order details for #${orderId} - Full details page coming soon!`);
        }
    </script>
</body>
</html>
