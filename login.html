<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ===== SEO META TAGS ===== -->
    <meta name="description" content="Login to your Aura Market account or create a new account to start shopping.">
    <meta name="keywords" content="login, signup, register, create account">
    <meta name="robots" content="noindex, follow">
    
    
    <title>Aura Market - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('assets/images/login-bg.jpg');
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 400px;
            color: white;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <h1 class="mb-4">Welcome Back</h1>
    <form id="login-form">
            <button onclick="SocialService.socialLogin('google')" class="btn btn-danger w-100 mb-2">
                <i class="fab fa-google"></i> Login with Google
            </button>
            <button onclick="SocialService.socialLogin('facebook')" class="btn btn-primary w-100">
                <i class="fab fa-facebook"></i> Login with Facebook
            </button>
        <div class="mb-3 text-start">
            <label>Email Address</label>
            <input type="email" id="login-email" class="form-control bg-transparent text-white" required>
        </div>
        <div class="mb-3 text-start">
            <label>Password</label>
            <input type="password" id="login-pass" class="form-control bg-transparent text-white" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-3">Enter Aura</button>
    </form>
    <p class="mt-3 small">Don't have an account? <a href="signup.html" class="text-info">Sign Up</a></p>
</div>

<script src="js/login.js"></script>
<script src="js/core/config.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/modules/products.js"></script>
<script src="js/modules/auth.js"></script>
<script src="js/modules/wishlist.js"></script>
<script src="js/modules/cart.js"></script>
<script src="js/theme.js"></script>  
<script src="js/pages/home.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-pass').value;
    
    if (AuthService.login(email, password)) {
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1500);
    }
});
</script>
</body>
</html>
