<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful - Aura Market</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body {
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .success-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid #333;
            color: white;
        }
        .check-icon {
            width: 80px;
            height: 80px;
            background: #28a745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: white;
        }
        .order-summary {
            background: #252525;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
        }
        .back-btn {
            background: #09a5db;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #0789b7;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="success-card text-center">
    <div class="check-icon">
        <i class="fa fa-check"></i>
    </div>
    
    <h2 class="mb-2">Payment Successful! 🎉</h2>
    <p class="text-white-50 mb-4">Thank you for shopping with Aura Market</p>
    
    <div class="order-summary text-start">
        <p class="mb-2"><strong>Order Reference:</strong></p>
        <p class="text-warning" id="order-ref">N/A</p>
        
        <hr class="border-secondary">
        
        <p class="mb-3"><strong>Items Purchased:</strong></p>
        <div id="order-summary" class="mb-3"></div>
        
        <hr class="border-secondary">
        
        <p class="mb-0"><strong>Total Paid:</strong> <span class="float-end" id="total-paid">$0.00</span></p>
    </div>
    
    <a href="index.html" class="back-btn mt-3">
        <i class="fa fa-shopping-bag me-2"></i>Continue Shopping
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/success.js"></script>

</body>
</html>
